---
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up env
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Set up pnpm
        # v6.0.8
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
        with:
          version: 11.5.2
      - name: Set up Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .node-version
          cache: pnpm
      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          PNPM_BIN_DIR=$(pnpm bin)
          echo "$PNPM_BIN_DIR" >> $GITHUB_PATH
      - name: Set up Lua
        # v11
        uses: luarocks/gh-actions-lua@989f8e6ffba55ce1817e236478c98558e598776c
        with:
          luaVersion: "5.1"
      - name: Setup Luarocks
        # tag v6 - no release available
        uses: luarocks/gh-actions-luarocks@7c85eeff60655651b444126f2a78be784e836a0a
      - name: Install luarocks-build-treesitter-parser Package
        run: |
          luarocks \
            --local \
            --lua-version=5.1 \
            install luarocks-build-treesitter-parser
      - name: LuaRocks Upload
        # v7.2.0
        uses: lumen-oss/luarocks-tag-release@adbca66e871a519055f4917c6af5fbf19f656f5d
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        with:
          name: kulala.nvim
          version: ${{ env.VERSION }}
          labels: |
            neovim
            kulala
          summary: A fully-featured 🤏 HTTP/GraphQL/gRPC/Websocket-client 🐼 interface 🖥️ for Neovim ❤️, that supports the Jetbrains .http spec (with full scripting support).
          dependencies: |
            tree-sitter-kulala_http
      - name: Create Release
        run: ./scripts/release.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
