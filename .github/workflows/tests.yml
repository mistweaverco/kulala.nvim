---
name: Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: >-
          PR number to test (use for fork PRs).
          Leave empty to test the branch selected above.
        required: false
        type: string
      run_windows:
        description: Run Windows tests
        required: false
        type: boolean
        default: false

concurrency:
  group: tests-${{ inputs.pull_request_number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve:
    name: Resolve target
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Check user permission
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const { data: permission } =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.actor
              });
            const allowed = ['admin', 'write'];
            if (!allowed.includes(permission.permission)) {
              core.setFailed(
                'Only collaborators with write access can run this workflow.'
              );
            }

      - name: Resolve checkout ref
        id: resolve
        uses: actions/github-script@v9.0.0
        with:
          script: |
            let ref;
            if (context.eventName === 'push') {
              ref = context.sha;
            } else {
              const prNumber = '${{ inputs.pull_request_number }}'.trim();
              if (prNumber) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(prNumber)
                });
                ref = pr.head.sha;
              } else {
                ref = context.ref.replace('refs/', '');
              }
            }
            core.setOutput('ref', ref);

  test-linux:
    needs: resolve
    name: Test Code on Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - name: Set up Node.js
        # v6.4.o
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
      - name: Install dependencies
        env:
          NEOVIM_VERSION: '0.12.2'
        run: ./scripts/install-ci.sh
      - name: Run tests
        run: ./minitest.sh

  lint:
    needs: resolve
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - name: Set up Node.js
        # v6.4.o
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
      - name: Install dependencies
        env:
          NEOVIM_VERSION: '0.12.3'
        run: ./scripts/install-ci.sh
      - name: Lint code
        run: ./scripts/lint.sh code

  test-windows:
    needs: resolve
    if: github.event_name == 'workflow_dispatch' && inputs.run_windows
    name: Test Code on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.resolve.outputs.ref }}
      - name: Set up Node.js
        # v6.4.o
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
      - name: Restore cache
        id: cache-deps
        uses: actions/cache@v5.0.4
        with:
          path: |
            .tests
            ~\scoop
            ~\AppData\Roaming\LJ4W
            ~\AppData\Roaming\luarocks
          key: ${{ runner.os }}-tests
      - name: Check if cache hit
        if: steps.cache-deps.outputs.cache-hit == 'true'
        run: echo "GH_CACHE_HIT=true" >> $Env:GITHUB_ENV
      - name: Install dependencies
        run: ./scripts/install-ci.ps1
      - name: Save cache
        uses: actions/cache/save@v4
        with:
          path: |
            .tests
            ~\scoop
            ~\AppData\Roaming\LJ4W
            ~\AppData\Roaming\luarocks
          key: ${{ runner.os }}-tests
      - name: Run tests
        shell: bash
        run: ./minitest.sh
